<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RETARD FIGHTER - v0.72</title>
<style>
  body { margin:0; background:#111; font-family:'Courier New', monospace; text-align:center; color:#0f0; overflow:hidden; }
  canvas { border:6px solid #ff3333; background:#222; box-shadow:0 0 20px rgba(255,51,51,0.6); margin-top:15px; }
  h1 { color:#ff0; text-shadow:0 0 15px #f00; margin:10px 0 5px; }
  #info { background:rgba(0,0,0,0.9); padding:12px; border:3px solid #ff0; display:inline-block; font-weight:bold; }
</style>
</head>
<body>
<h1>RETARD FIGHTER</h1>
<div id="info">
  WASD/Arrows = Move | SPACE = Punch | E = Knee | Q = Special | R = Rage Mode | P = JERK OFF
</div>
<canvas id="game" width="950" height="500"></canvas>

<script>
// v0.72 - Full heal after fights + more attacks
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const playerImg = new Image();
playerImg.src = 'https://upload.wikimedia.org/wikipedia/en/9/9c/George_Floyd.png';

let player = { 
  x: 120, y: 260, width: 70, height: 110, 
  health: 100, maxHealth: 100, 
  speed: 5.5, meleeCd: 0, specialCd: 0, semenCd: 0, 
  rage: 0, jerking: false, jerkTime: 0, jerkFrame: 0 
};

let currentEnemyIndex = 0;
let gameOver = false;
let winner = '';
let round = 1;
let particles = [];
let hitFlashes = [];

const grandpaImg = new Image();
grandpaImg.src = 'https://pbs.twimg.com/media/CvetJ62WgAAKS4-.jpg';

const karenImg = new Image();
karenImg.src = 'https://www.transcare.org.au/wp-content/uploads/2019/08/Karen-Scooter.jpg';

const finalBossImg = new Image();
finalBossImg.src = 'https://static8.depositphotos.com/1211672/1016/i/950/depositphotos_10161945-stock-photo-man-with-down-syndrome-on.jpg';

const enemies = [
  { name: "Scooter Gramps", x: 680, y: 230, w: 140, h: 140, health: 160, maxHealth: 160, speed: 2.7, img: grandpaImg },
  { name: "Karen Scooter", x: 670, y: 210, w: 160, h: 160, health: 145, maxHealth: 145, speed: 3.9, img: karenImg },
  { name: "FINAL RETARD BOSS", x: 590, y: 140, w: 260, h: 240, health: 480, maxHealth: 480, speed: 1.6, img: finalBossImg }
];

let keys = {};
window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

function spawnCum(x, y, vx, vy) {
  particles.push({ x, y, vx: vx + Math.random()*6-2, vy: vy + Math.random()*7-4, life: 50, size: 11 });
}

function triggerHitFlash(x, y) {
  hitFlashes.push({ x, y, radius: 55, alpha: 1 });
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#3a3a3a';
  ctx.fillRect(0, 380, canvas.width, 120);

  // Player
  if (playerImg.complete) {
    ctx.save();
    const offset = player.jerking ? Math.sin(player.jerkFrame * 0.5) * 10 : 0;
    ctx.drawImage(playerImg, player.x, player.y + offset, player.width, player.height);
    ctx.restore();
  } else {
    ctx.fillStyle = '#0ff';
    ctx.fillRect(player.x, player.y, player.width, player.height);
  }

  const e = enemies[currentEnemyIndex];

  if (e.img && e.img.complete) {
    ctx.save();
    const facingRight = (player.x - e.x) < 0;
    if (!facingRight) {
      ctx.translate(e.x + e.w, e.y);
      ctx.scale(-1, 1);
      ctx.drawImage(e.img, 0, 0, e.w, e.h);
    } else {
      ctx.drawImage(e.img, e.x, e.y, e.w, e.h);
    }
    ctx.restore();
  } else {
    ctx.fillStyle = "#f80";
    ctx.fillRect(e.x, e.y, e.w, e.h);
  }

  // Cum
  ctx.fillStyle = '#fff';
  for (let p of particles) {
    ctx.globalAlpha = p.life / 50;
    ctx.fillRect(p.x, p.y, p.size, p.size*0.7);
  }
  ctx.globalAlpha = 1;

  // Flashes
  for (let h of hitFlashes) {
    ctx.strokeStyle = `rgba(255,220,100,${h.alpha})`;
    ctx.lineWidth = 8;
    ctx.beginPath();
    ctx.arc(h.x, h.y, h.radius, 0, Math.PI*2);
    ctx.stroke();
  }

  // HUD
  ctx.fillStyle = '#111'; ctx.fillRect(40, 30, 320, 28);
  ctx.fillStyle = '#0ff'; ctx.fillRect(40, 30, (player.health / player.maxHealth) * 320, 28);
  
  ctx.fillStyle = '#111'; ctx.fillRect(590, 30, 320, 28);
  ctx.fillStyle = '#f33'; ctx.fillRect(590, 30, (e.health / e.maxHealth) * 320, 28);

  ctx.font = 'bold 18px monospace';
  ctx.fillStyle = '#fff';
  ctx.fillText('GEORGE', 45, 22);
  ctx.fillText(e.name.toUpperCase(), 595, 22);
  ctx.fillText(`ROUND ${round}/3`, 410, 55);

  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.9)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.font = 'bold 52px monospace';
    ctx.fillStyle = winner === 'player' ? '#0f0' : '#f00';
    ctx.fillText(winner === 'player' ? 'MALL CLEANED' : 'YOU GOT RETARDED', 190, 260);
  }
}

function update() {
  if (gameOver) return;
  const e = enemies[currentEnemyIndex];

  // Movement
  if (keys['arrowleft'] || keys['a']) player.x -= player.speed;
  if (keys['arrowright'] || keys['d']) player.x += player.speed;
  if (keys['arrowup'] || keys['w']) player.y -= player.speed;
  if (keys['arrowdown'] || keys['s']) player.y += player.speed;

  player.x = Math.max(10, Math.min(680, player.x));
  player.y = Math.max(170, Math.min(350, player.y));

  if (player.meleeCd > 0) player.meleeCd--;
  if (player.specialCd > 0) player.specialCd--;
  if (player.semenCd > 0) player.semenCd--;
  if (player.rage > 0) player.rage--;

  // SPACE - Punch
  if (keys[' '] && player.meleeCd === 0) {
    player.meleeCd = 11;
    if (Math.abs(player.x - e.x) < 170) e.health -= player.rage > 0 ? 22 : 15;
  }

  // E - Knee Strike
  if (keys['e'] && player.meleeCd === 0) {
    player.meleeCd = 18;
    if (Math.abs(player.x - e.x) < 130) e.health -= player.rage > 0 ? 35 : 25;
  }

  // Q - Special
  if (keys['q'] && player.specialCd === 0) {
    player.specialCd = 70;
    if (Math.abs(player.x - e.x) < 260) e.health -= player.rage > 0 ? 55 : 42;
  }

  // R - Rage Mode
  if (keys['r'] && player.rage === 0) {
    player.rage = 180; // 3 seconds of rage
  }

  // P - Jerk Off
  if (keys['p'] && player.semenCd === 0 && !player.jerking) {
    player.jerking = true;
    player.jerkTime = 115;
    player.semenCd = 165;
    player.jerkFrame = 0;
  }

  if (player.jerking) {
    player.jerkTime--;
    player.jerkFrame++;
    if (player.jerkTime <= 0) {
      player.jerking = false;
      for (let i = 0; i < 26; i++) {
        spawnCum(player.x + 55, player.y + 55, 13 + Math.random()*8, -5 + Math.random()*9);
      }
    }
  }

  // Update cum
  for (let i = particles.length-1; i >= 0; i--) {
    let p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.45;
    p.life--;
    if (p.x > e.x && p.x < e.x + e.w && p.y > e.y && p.y < e.y + e.h && p.life > 8) {
      e.health -= player.rage > 0 ? 18 : 13.5;
      particles.splice(i, 1);
      triggerHitFlash(p.x, p.y);
      continue;
    }
    if (p.life <= 0) particles.splice(i, 1);
  }

  for (let i = hitFlashes.length-1; i >= 0; i--) {
    hitFlashes[i].alpha -= 0.08;
    if (hitFlashes[i].alpha <= 0) hitFlashes.splice(i, 1);
  }

  // Enemy AI
  if (e.health > 0) {
    const dx = player.x - e.x;
    if (Math.abs(dx) > 95) e.x += Math.sign(dx) * e.speed;
    if (Math.random() < 0.04) player.health -= 5.2;
  }

  // Round end + FULL HEAL
  if (e.health <= 0) {
    if (currentEnemyIndex < 2) {
      currentEnemyIndex++;
      round++;
      player.health = player.maxHealth;   // ← FULL REFILL
      particles = [];
    } else {
      gameOver = true;
      winner = 'player';
    }
  }

  if (player.health <= 0) {
    gameOver = true;
    winner = 'enemy';
  }
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
